<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>作業日報</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:#f0ede6;color:#222;font-size:16px}
.app{max-width:640px;margin:0 auto;padding:16px 12px 100px}
h1{font-size:20px;font-weight:700;margin-bottom:16px}
.date-row{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.date-row label{font-size:14px;color:#666;flex-shrink:0}
input[type=date]{font-size:16px;padding:8px 10px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#222;width:180px;-webkit-appearance:none}
.cat{background:#fff;border-radius:10px;margin-bottom:16px;overflow:hidden;border:1px solid #ddd}
.cat-head{background:#444;color:#fff;padding:10px 14px;font-size:15px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.add-row-btn{font-size:12px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);border-radius:5px;padding:5px 12px;cursor:pointer;color:#fff}
.row-block{border-bottom:1px solid #eee;padding:12px 14px}
.row-block:last-child{border-bottom:none}
.row-top{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.site-input{flex:1;font-size:15px;padding:9px 10px;border:1px solid #ccc;border-radius:8px;background:#f9f9f9;color:#222;-webkit-appearance:none;width:100%}
.site-input:focus{outline:none;border-color:#2a7ae2;background:#fff}
.del-row-btn{flex-shrink:0;background:transparent;border:1px solid #ddd;border-radius:6px;padding:6px 10px;font-size:16px;cursor:pointer;color:#bbb;line-height:1}
.del-row-btn:active{color:#c0392b;border-color:#c0392b}
.time-list{display:flex;flex-direction:column;gap:8px}
.time-item{display:flex;align-items:center;gap:8px}
.time-label{font-size:12px;color:#888;flex-shrink:0;width:140px}
.time-input{flex:1;font-size:15px;padding:8px 10px;border:1px solid #ccc;border-radius:8px;background:#f9f9f9;color:#222;-webkit-appearance:none}
.time-input:focus{outline:none;border-color:#2a7ae2;background:#fff}
.actions{position:fixed;bottom:0;left:0;right:0;background:#f0ede6;border-top:1px solid #ddd;padding:10px 12px;display:flex;gap:8px;flex-wrap:wrap}
.btn-save{flex:1;padding:13px;border-radius:8px;border:1px solid #bbb;background:#fff;cursor:pointer;font-size:13px;color:#333;font-family:inherit;min-width:70px}
.btn-pdf{flex:2;padding:13px;border-radius:8px;border:none;background:#e8734a;cursor:pointer;font-size:13px;color:#fff;font-family:inherit;font-weight:700;min-width:100px}
.btn-pdf:active{background:#c05a35}
.btn-export{flex:2;padding:13px;border-radius:8px;border:none;background:#2a7ae2;cursor:pointer;font-size:13px;color:#fff;font-family:inherit;font-weight:700;min-width:100px}
.btn-export:active{background:#1a5fba}
.notice{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;display:none;white-space:nowrap;z-index:100}

/* 印刷・PDF用スタイル */
@media print{
  body{background:#fff;font-size:12px}
  .app{padding:10px}
  .actions,.notice,.add-row-btn,.del-row-btn{display:none!important}
  h1{font-size:18px;margin-bottom:8px}
  .cat{border:1px solid #999;margin-bottom:12px;break-inside:avoid}
  .cat-head{background:#333!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;padding:7px 12px;font-size:13px}
  .row-block{padding:8px 12px}
  .time-label{width:120px;font-size:11px}
  .time-input{border:none;background:transparent;font-size:12px;padding:4px 6px}
  .site-input{border:none;background:transparent;font-size:13px;font-weight:700;padding:4px 6px}
  .row-top{margin-bottom:6px}
  .time-list{gap:4px}
  .print-header{display:flex!important;align-items:baseline;gap:12px;margin-bottom:12px;border-bottom:2px solid #333;padding-bottom:8px}
}
.print-header{display:none}
</style>
</head>
<body>
<div class="app">
  <div class="print-header">
    <h1>作業日報</h1>
    <span id="printDate" style="font-size:16px;color:#555"></span>
  </div>
  <h1 class="screen-only">作業日報</h1>
  <div class="date-row screen-only">
    <label>日付</label>
    <input type="date" id="reportDate">
  </div>
  <div id="cats"></div>
</div>
<div class="actions screen-only">
  <button class="btn-save" onclick="saveData()">💾 保存</button>
  <button class="btn-pdf" onclick="printPDF()">🖨️ PDF出力</button>
  <button class="btn-export" onclick="exportHTML()">📤 HTML共有</button>
</div>
<div class="notice" id="notice"></div>
<script>
const TIMES=[
  {label:'8:00〜10:00',key:'t1'},
  {label:'10:30〜12:00',key:'t2'},
  {label:'13:00〜15:00',key:'t3'},
  {label:'15:30〜17:00',key:'t4'},
  {label:'17:00〜20:00(残業)',key:'t5'}
];
const CATS=[
  {id:'dai1',name:'第一加工場'},
  {id:'dai2',name:'第二加工場'},
  {id:'han', name:'搬入運搬'},
  {id:'hiroi',name:'拾い出し（加工場）'}
];
let data={};

function initData(d){
  data={date:d};
  CATS.forEach(c=>{data[c.id]=[newRow()];});
}
function newRow(){return{site:'',t1:'',t2:'',t3:'',t4:'',t5:''};}

function today(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function render(){
  const cont=document.getElementById('cats');
  cont.innerHTML='';
  CATS.forEach(cat=>{
    const rows=data[cat.id];
    let rowsHtml=rows.map((row,ri)=>{
      let timeItems=TIMES.map(t=>`
        <div class="time-item">
          <span class="time-label">${t.label}</span>
          <input class="time-input" type="text" value="${esc(row[t.key]||'')}" placeholder="名前" onchange="setVal('${cat.id}',${ri},'${t.key}',this.value)">
        </div>`).join('');
      let delBtn=ri>0?`<button class="del-row-btn" onclick="delRow('${cat.id}',${ri})">×</button>`:'';
      return`<div class="row-block">
        <div class="row-top">
          <input class="site-input" type="text" value="${esc(row.site||'')}" placeholder="現場名を入力" onchange="setVal('${cat.id}',${ri},'site',this.value)">
          ${delBtn}
        </div>
        <div class="time-list">${timeItems}</div>
      </div>`;
    }).join('');
    cont.innerHTML+=`<div class="cat">
      <div class="cat-head">
        <span>${cat.name}</span>
        <button class="add-row-btn" onclick="addRow('${cat.id}')">＋ 現場追加</button>
      </div>
      ${rowsHtml}
    </div>`;
  });
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function setVal(catId,ri,key,val){data[catId][ri][key]=val;}
function addRow(catId){data[catId].push(newRow());render();}
function delRow(catId,ri){data[catId].splice(ri,1);render();}

function showNotice(msg){
  const n=document.getElementById('notice');
  n.textContent=msg;n.style.display='block';
  setTimeout(()=>{n.style.display='none';},2500);
}

function saveData(){
  try{localStorage.setItem('nippo_'+data.date,JSON.stringify(data));showNotice('✓ 保存しました');}
  catch(e){showNotice('✓ 入力内容を確認しました');}
}

function printPDF(){
  const d=document.getElementById('reportDate').value||today();
  document.getElementById('printDate').textContent=d;
  window.print();
}

function exportHTML(){
  const d=document.getElementById('reportDate').value||today();
  const now=new Date().toLocaleString('ja-JP');
  let secHtml='';
  CATS.forEach(cat=>{
    const rows=(data[cat.id]||[]).filter(r=>r.site||TIMES.some(t=>r[t.key]));
    if(!rows.length)return;
    let ths=TIMES.map(t=>`<th style="background:#f0ede6;padding:8px 5px;border:1px solid #ccc;font-size:11px;white-space:nowrap;font-weight:500">${t.label}</th>`).join('');
    let trs=rows.map(row=>{
      let tds=TIMES.map(t=>{
        const w=row[t.key]||'';
        if(w==='→')return`<td style="padding:8px 5px;border:1px solid #ddd;text-align:center;color:#aaa">→</td>`;
        if(w)return`<td style="padding:8px 5px;border:1px solid #ddd;text-align:center;background:#e6f4e6;font-weight:600;font-size:13px">${w}</td>`;
        return`<td style="padding:8px 5px;border:1px solid #ddd;text-align:center"></td>`;
      }).join('');
      return`<tr><td style="padding:8px 10px;border:1px solid #ddd;font-weight:600;font-size:13px;background:#fafaf8">${row.site||''}</td>${tds}</tr>`;
    }).join('');
    secHtml+=`<div style="margin-bottom:1.5rem">
      <div style="background:#333;color:#fff;padding:8px 14px;font-size:14px;font-weight:700;border-radius:5px 5px 0 0">${cat.name}</div>
      <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;background:#fff;min-width:500px">
        <thead><tr><th style="background:#f0ede6;padding:8px 10px;border:1px solid #ccc;text-align:left;min-width:100px;font-size:12px">現場名</th>${ths}</tr></thead>
        <tbody>${trs}</tbody>
      </table></div>
    </div>`;
  });
  if(!secHtml){alert('データが入力されていません。');return;}
  const html=`<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>作業日報 ${d}</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:#f4f2ed;color:#222}.container{max-width:980px;margin:0 auto;padding:1.5rem 1rem 3rem}header{display:flex;align-items:baseline;gap:16px;margin-bottom:1.5rem;border-bottom:2px solid #333;padding-bottom:10px}h1{font-size:20px;font-weight:700}.date-lbl{font-size:17px;color:#555}.footer{margin-top:2rem;font-size:11px;color:#aaa;text-align:right}@media print{body{background:#fff}}</style></head><body><div class="container"><header><h1>作業日報</h1><span class="date-lbl">${d}</span></header>${secHtml}<div class="footer">作成：${now}</div></div></body></html>`;
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`nippo_${d}.html`;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  showNotice('✓ 作成しました！');
}

const td=today();
document.getElementById('reportDate').value=td;
initData(td);
render();
document.getElementById('reportDate').addEventListener('change',function(){
  initData(this.value);render();
});
</script>
</body>
</html>
