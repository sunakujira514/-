<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>作業日報</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:#f0ede6;color:#222;font-size:16px}
.app{max-width:640px;margin:0 auto;padding:16px 12px 140px}
h1{font-size:20px;font-weight:700;margin-bottom:16px}
.date-row{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.date-row label{font-size:14px;color:#666;flex-shrink:0}
input[type=date]{font-size:16px;padding:8px 10px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#222;width:180px;-webkit-appearance:none}
.cat{background:#fff;border-radius:10px;margin-bottom:16px;overflow:hidden;border:1px solid #ddd}
.cat-head{background:#444;color:#fff;padding:10px 14px;font-size:15px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.add-row-btn{font-size:12px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);border-radius:5px;padding:5px 12px;cursor:pointer;color:#fff}
.row-block{border-bottom:1px solid #eee;padding:12px 14px}
.row-block:last-child{border-bottom:none}
.row-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.site-input{flex:1;font-size:15px;padding:9px 10px;border:1px solid #ccc;border-radius:8px;background:#f9f9f9;color:#222;-webkit-appearance:none;width:100%}
.site-input:focus{outline:none;border-color:#2a7ae2;background:#fff}
.del-row-btn{flex-shrink:0;background:transparent;border:1px solid #ddd;border-radius:6px;padding:6px 10px;font-size:16px;cursor:pointer;color:#bbb;line-height:1}
.del-row-btn:active{color:#c0392b;border-color:#c0392b}
.truck-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.truck-label{font-size:12px;color:#888;flex-shrink:0}
.truck-tags{display:flex;flex-wrap:wrap;gap:6px;flex:1}
.truck-tag{display:flex;align-items:center;gap:4px;background:#fff3e0;border:1px solid #f0a060;border-radius:16px;padding:3px 10px;font-size:12px;color:#c06000}
.truck-tag-del{background:transparent;border:none;cursor:pointer;color:#c09060;font-size:13px;line-height:1}
.truck-tag-del:active{color:#c0392b}
.truck-pick-btn{font-size:12px;background:#fff3e0;border:1px solid #f0a060;border-radius:16px;padding:4px 10px;cursor:pointer;color:#c06000}
.truck-pick-btn:active{background:#ffe0b0}
.time-list{display:flex;flex-direction:column;gap:10px}
.time-item{display:flex;align-items:flex-start;gap:8px}
.time-label{font-size:12px;color:#888;flex-shrink:0;width:140px;padding-top:6px}
.time-right{flex:1;display:flex;flex-direction:column;gap:6px}
.time-names{display:flex;flex-wrap:wrap;gap:6px}
.time-name-tag{display:flex;align-items:center;gap:4px;background:#e8f4e8;border:1px solid #90c090;border-radius:16px;padding:4px 10px;font-size:13px;color:#2a6a2a}
.time-name-tag-del{background:transparent;border:none;cursor:pointer;color:#90b090;font-size:13px;line-height:1}
.time-name-tag-del:active{color:#c0392b}
.time-pick-btn{font-size:12px;background:#f0f7f0;border:1px solid #b0d0b0;border-radius:8px;padding:6px 8px;cursor:pointer;color:#5a7a5a;white-space:nowrap;flex-shrink:0}
.time-pick-btn:active{background:#d0ead0}
.time-manual-row{display:flex;gap:4px;align-items:center}
.time-manual-input{width:90px;flex-shrink:1;font-size:13px;padding:6px 8px;border:1px solid #ccc;border-radius:8px;background:#f9f9f9;color:#222;-webkit-appearance:none;min-width:0}
.time-manual-input:focus{outline:none;border-color:#2a7ae2;background:#fff}
.time-manual-add{padding:6px 8px;border-radius:8px;border:none;background:#5a7a5a;color:#fff;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.time-manual-add:active{background:#3a5a3a}
.actions{position:fixed;bottom:0;left:0;right:0;background:#f0ede6;border-top:1px solid #ddd;padding:6px 12px;display:flex;flex-direction:column;gap:6px}
.actions-row{display:flex;gap:8px}
.btn-copy{flex:1;padding:10px;border-radius:8px;border:1px solid #a0a0d0;background:#f0f0ff;cursor:pointer;font-size:13px;color:#333;font-family:inherit}
.btn-save{flex:1;padding:13px;border-radius:8px;border:1px solid #bbb;background:#fff;cursor:pointer;font-size:13px;color:#333;font-family:inherit}
.btn-pdf{flex:1;padding:13px;border-radius:8px;border:none;background:#e8734a;cursor:pointer;font-size:13px;color:#fff;font-family:inherit;font-weight:700}
.btn-export{flex:1;padding:13px;border-radius:8px;border:none;background:#2a7ae2;cursor:pointer;font-size:13px;color:#fff;font-family:inherit;font-weight:700}
.notice{position:fixed;bottom:95px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 18px;border-radius:20px;font-size:13px;display:none;white-space:nowrap;z-index:100}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal{background:#fff;border-radius:14px;padding:24px 20px;max-width:420px;width:100%}
.modal h2{font-size:16px;font-weight:700;margin-bottom:10px}
.modal p{font-size:13px;color:#555;line-height:1.7;margin-bottom:12px}
.modal-url{background:#f4f2ed;border-radius:8px;padding:10px 12px;font-size:10px;color:#666;word-break:break-all;margin-bottom:16px;border:1px solid #ddd;max-height:70px;overflow-y:auto}
.modal-btns{display:flex;gap:10px}
.modal-btn-copy{flex:1;padding:12px;border-radius:8px;border:none;background:#2a7ae2;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.modal-btn-close{flex:1;padding:12px;border-radius:8px;border:1px solid #ccc;background:#fff;color:#333;font-size:14px;cursor:pointer;font-family:inherit}
.popup-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:300;display:none;align-items:flex-end;justify-content:center}
.popup-overlay.show{display:flex}
.popup-sheet{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:640px;padding:0 0 20px;max-height:75vh;display:flex;flex-direction:column}
.popup-head{padding:16px 16px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #eee;flex-shrink:0}
.popup-title{font-size:15px;font-weight:700;color:#333}
.popup-close{background:transparent;border:none;font-size:22px;cursor:pointer;color:#aaa;padding:0 4px;line-height:1}
.popup-search{padding:10px 16px;border-bottom:1px solid #eee;flex-shrink:0}
.popup-search input{width:100%;font-size:15px;padding:9px 12px;border:1px solid #ccc;border-radius:8px;background:#f9f9f9;-webkit-appearance:none}
.popup-search input:focus{outline:none;border-color:#2a7ae2}
.popup-list{overflow-y:auto;flex:1}
.popup-list-item{padding:14px 20px;border-bottom:1px solid #f0f0f0;font-size:15px;cursor:pointer;color:#333;display:flex;justify-content:space-between;align-items:center}
.popup-list-item:active{background:#f0f7ff}
.popup-list-item .yomi{font-size:12px;color:#aaa}
.popup-list-item.clear{color:#e8734a;font-weight:500}
.popup-list-empty{padding:20px;text-align:center;color:#aaa;font-size:14px}
.popup-done-bar{padding:12px 16px;border-top:1px solid #eee;flex-shrink:0}
.popup-done-btn{width:100%;padding:12px;border-radius:8px;border:none;background:#2a7ae2;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.truck-popup-item{padding:14px 20px;border-bottom:1px solid #f0f0f0;font-size:15px;cursor:pointer;color:#333}
.truck-popup-item:active{background:#fff3e0}
.history-box{background:#fff;border-radius:10px;margin-bottom:16px;border:1px solid #ddd;overflow:hidden}
.history-head{background:#777;color:#fff;padding:9px 14px;font-size:13px;font-weight:700}
.history-item{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid #f0f0f0;cursor:pointer}
.history-item:last-child{border-bottom:none}
.history-item:active{background:#f4f2ed}
.history-date{font-size:14px;color:#333;font-weight:500}
.history-arrow{color:#bbb;font-size:18px}
.member-box{background:#fff;border-radius:10px;margin-bottom:16px;border:1px solid #ddd;overflow:hidden}
.member-head{background:#5a7a5a;color:#fff;padding:10px 14px;font-size:13px;font-weight:700;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.member-toggle-btn{font-size:12px;background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);border-radius:5px;padding:4px 10px;cursor:pointer;color:#fff}
.member-body{display:none;padding:12px 14px}
.member-body.open{display:block}
.member-section-title{font-size:12px;font-weight:700;color:#666;margin:10px 0 6px}
.member-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;min-height:20px}
.member-tag{display:flex;align-items:center;gap:4px;background:#f0f7f0;border:1px solid #b0d0b0;border-radius:20px;padding:5px 10px;font-size:13px}
.member-tag-name{font-weight:500}
.member-tag-yomi{font-size:11px;color:#888}
.member-tag-del{background:transparent;border:none;cursor:pointer;color:#999;font-size:14px;line-height:1;margin-left:2px}
.member-tag-del:active{color:#c0392b}
.truck-reg-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px;min-height:20px}
.truck-reg-tag{display:flex;align-items:center;gap:4px;background:#fff3e0;border:1px solid #f0a060;border-radius:20px;padding:5px 10px;font-size:13px}
.truck-reg-tag-del{background:transparent;border:none;cursor:pointer;color:#c09060;font-size:14px;line-height:1;margin-left:2px}
.truck-reg-tag-del:active{color:#c0392b}
.member-add-row{display:flex;flex-direction:column;gap:8px}
.member-add-inputs{display:flex;gap:8px}
.member-add-input{flex:1;font-size:14px;padding:8px 10px;border:1px solid #ccc;border-radius:8px;background:#f9f9f9;-webkit-appearance:none;min-width:0}
.member-add-input:focus{outline:none;border-color:#5a7a5a}
.member-add-btn{padding:8px 14px;border-radius:8px;border:none;background:#5a7a5a;color:#fff;font-size:13px;cursor:pointer;font-family:inherit;font-weight:700;white-space:nowrap}
.truck-add-btn{padding:8px 14px;border-radius:8px;border:none;background:#c07030;color:#fff;font-size:13px;cursor:pointer;font-family:inherit;font-weight:700;white-space:nowrap}
.member-add-hint{font-size:11px;color:#aaa;padding-left:2px}
@media print{
  body{background:#fff}.app{padding:10px}
  .actions,.notice,.modal-overlay,.popup-overlay,.add-row-btn,.del-row-btn,.history-box,.member-box,.time-pick-btn,.truck-pick-btn,.truck-tag-del,.time-name-tag-del{display:none!important}
  .cat{border:1px solid #999;margin-bottom:12px;break-inside:avoid}
  .cat-head{background:#333!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;padding:7px 12px;font-size:13px}
  .row-block{padding:8px 12px}.time-label{font-size:11px;padding-top:4px}
  .site-input{border:none;background:transparent;font-size:13px;font-weight:700;padding:4px 6px}
  .truck-row{margin-bottom:6px}
  .print-header{display:flex!important;align-items:baseline;gap:12px;margin-bottom:12px;border-bottom:2px solid #333;padding-bottom:8px}
}
.print-header{display:none}
</style>
</head>
<body>
<div class="app">
  <div class="print-header">
    <h1>作業日報</h1>
    <span id="printDate" style="font-size:16px;color:#555"></span>
  </div>
  <h1>作業日報</h1>
  <div class="date-row">
    <label>日付</label>
    <input type="date" id="reportDate">
  </div>
  <div id="memberBox"></div>
  <div id="historyBox"></div>
  <div id="cats"></div>
</div>
<div class="actions">
  <div class="actions-row">
    <button class="btn-save" onclick="saveData()">💾 保存</button>
    <button class="btn-pdf" onclick="printPDF()">🖨️ PDF</button>
    <button class="btn-export" onclick="exportHTML()">📤 共有</button>
  </div>
  <div class="actions-row">
    <button class="btn-copy" onclick="copyPrevDay()">📋 前日の内容をコピー</button>
  </div>
</div>
<div class="notice" id="notice"></div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>💾 保存しました</h2>
    <p>データはURLに保存されています。<br>このURLをブックマークに追加すると<br>次回開いたときに全ての日報が復元されます。</p>
    <div class="modal-url" id="modalUrl"></div>
    <div class="modal-btns">
      <button class="modal-btn-copy" onclick="copyUrl()">📋 URLをコピー</button>
      <button class="modal-btn-close" onclick="closeModal()">閉じる</button>
    </div>
  </div>
</div>

<!-- メンバー選択ポップアップ（複数選択） -->
<div class="popup-overlay" id="memberPopupOverlay" onclick="closePopupByOverlay(event,'memberPopupOverlay')">
  <div class="popup-sheet">
    <div class="popup-head">
      <span class="popup-title">👤 メンバーを選択（複数可）</span>
      <button class="popup-close" onclick="closePopup('memberPopupOverlay')">×</button>
    </div>
    <div class="popup-search">
      <input type="text" id="memberSearchInput" placeholder="名前・読みで絞り込み…" oninput="renderMemberList()">
    </div>
    <div class="popup-list" id="memberListInPopup"></div>
    <div class="popup-done-bar">
      <button class="popup-done-btn" onclick="closePopup('memberPopupOverlay')">✓ 完了</button>
    </div>
  </div>
</div>

<!-- トラック選択ポップアップ -->
<div class="popup-overlay" id="truckPopupOverlay" onclick="closePopupByOverlay(event,'truckPopupOverlay')">
  <div class="popup-sheet">
    <div class="popup-head">
      <span class="popup-title">🚛 トラックを選択</span>
      <button class="popup-close" onclick="closePopup('truckPopupOverlay')">×</button>
    </div>
    <div class="popup-list" id="truckListInPopup"></div>
    <div class="popup-done-bar">
      <button class="popup-done-btn" onclick="closePopup('truckPopupOverlay')">✓ 完了</button>
    </div>
  </div>
</div>

<!-- 時間帯コピーポップアップ -->
<div class="popup-overlay" id="copyTimePopupOverlay" onclick="closePopupByOverlay(event,'copyTimePopupOverlay')">
  <div class="popup-sheet">
    <div class="popup-head">
      <span class="popup-title">📋 コピー先の時間帯を選択</span>
      <button class="popup-close" onclick="closePopup('copyTimePopupOverlay')">×</button>
    </div>
    <div class="popup-list" id="copyTimeListInPopup"></div>
    <div class="popup-done-bar">
      <button class="popup-done-btn" onclick="execCopyTime()">✓ コピー実行</button>
    </div>
  </div>
</div>

<script>
const TIMES_ALL=[
  {label:'8:00〜10:00',key:'t1'},
  {label:'10:30〜12:00',key:'t2'},
  {label:'13:00〜15:00',key:'t3'},
  {label:'15:30〜17:00',key:'t4'},
  {label:'17:00〜20:00(残業)',key:'t5'}
];
const TIMES_NO_OT=[
  {label:'8:00〜10:00',key:'t1'},
  {label:'10:30〜12:00',key:'t2'},
  {label:'13:00〜15:00',key:'t3'},
  {label:'15:30〜17:00',key:'t4'}
];
const CATS=[
  {id:'dai1',name:'第一加工場',times:TIMES_ALL,hasTruck:true},
  {id:'dai2',name:'第二加工場',times:TIMES_ALL,hasTruck:true},
  {id:'han', name:'搬入運搬',  times:TIMES_NO_OT,hasTruck:true},
  {id:'hiroi',name:'拾い出し（加工場）',times:TIMES_ALL,hasTruck:false}
];
const DEFAULT_MEMBERS=[
  {name:'西村',yomi:'にしむら'},{name:'畑',yomi:'はた'},{name:'矢延',yomi:'やのぶ'},
  {name:'越村',yomi:'こしむら'},{name:'小田',yomi:'おだ'},{name:'後藤',yomi:'ごとう'},
  {name:'中西',yomi:'なかにし'},{name:'藤原',yomi:'ふじわら'},{name:'孫',yomi:'そん'},
  {name:'エモン',yomi:'えもん'},{name:'クリス',yomi:'くりす'},{name:'ラファエル',yomi:'らふぁえる'},
  {name:'劉',yomi:'りゅう'},{name:'ズイ',yomi:'ずい'},{name:'バグス',yomi:'ばぐす'},
  {name:'石岡',yomi:'いしおか'},{name:'岡本',yomi:'おかもと'},{name:'呉藤',yomi:'ごとう'},
  {name:'協力会社',yomi:'きょうりょくがいしゃ'}
];
const DEFAULT_TRUCKS=[
  '大型トラック','8tユニック','4tトラック','2tトラック','Wキャブ',
  '岡本大型ユニック','岡本大型トラック','岡本8tユニック','岡本3tユニック',
  '石岡8tユニック','石岡4tユニック',
  'インストール大型トラック','インストール大型ユニック','インストール10tミニ','インストール4tユニック'
];

let allData={};
let members=[...DEFAULT_MEMBERS];
let trucks=[...DEFAULT_TRUCKS];
let currentDate='';
// 時間帯複数選択用
let pickTarget={catId:null,ri:null,key:null};
let truckTarget={catId:null,ri:null};

function newRow(){
  const row={site:'',trucks:[]};
  [...TIMES_ALL,...TIMES_NO_OT].forEach(t=>{if(!row[t.key])row[t.key]=[];});
  return row;
}
function newDayData(d){const obj={date:d};CATS.forEach(c=>{obj[c.id]=[newRow()];});return obj;}
function today(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

function loadFromHash(){
  const hash=location.hash;
  if(!hash||hash.length<2)return false;
  try{
    const json=decodeURIComponent(atob(hash.slice(1)));
    const parsed=JSON.parse(json);
    if(parsed.allData){
      // 旧形式（文字列）を配列に変換
      Object.keys(parsed.allData).forEach(d=>{
        CATS.forEach(cat=>{
          (parsed.allData[d][cat.id]||[]).forEach(row=>{
            cat.times.forEach(t=>{
              if(typeof row[t.key]==='string'){row[t.key]=row[t.key]?[row[t.key]]:[];}
              if(!Array.isArray(row[t.key]))row[t.key]=[];
            });
            if(!row.trucks)row.trucks=[];
          });
        });
      });
      allData=parsed.allData;
    }
    if(parsed.members)members=parsed.members;
    if(parsed.trucks)trucks=parsed.trucks;
    return true;
  }catch(e){}
  return false;
}

function buildUrl(){
  const payload=JSON.stringify({allData,members,trucks});
  const encoded=btoa(encodeURIComponent(payload));
  return location.origin+location.pathname+'#'+encoded;
}

function saveData(){
  allData[currentDate]=getCurrentDayData();
  const url=buildUrl();
  history.replaceState(null,'',url);
  document.getElementById('modalUrl').textContent=url;
  document.getElementById('modalOverlay').classList.add('show');
  renderHistory();
}

function getCurrentDayData(){
  const obj={date:currentDate};
  CATS.forEach(cat=>{obj[cat.id]=(allData[currentDate]&&allData[currentDate][cat.id])||[newRow()];});
  return obj;
}

function loadDay(d){
  currentDate=d;
  document.getElementById('reportDate').value=d;
  if(!allData[d])allData[d]=newDayData(d);
  renderCats();renderHistory();
}

function renderHistory(){
  const dates=Object.keys(allData).sort().reverse();
  const box=document.getElementById('historyBox');
  if(!dates.length){box.innerHTML='';return;}
  let items=dates.map(d=>{
    const active=d===currentDate?'style="background:#f0f7ff"':'';
    return`<div class="history-item" ${active} onclick="loadDay('${d}')"><span class="history-date">📅 ${d}</span><span class="history-arrow">›</span></div>`;
  }).join('');
  box.innerHTML=`<div class="history-box"><div class="history-head">📂 保存済み日報</div>${items}</div>`;
}

function renderMembers(){
  const box=document.getElementById('memberBox');
  const memberTags=members.map((m,i)=>`
    <div class="member-tag">
      <span class="member-tag-name">${esc(m.name)}</span>
      ${m.yomi?`<span class="member-tag-yomi">（${esc(m.yomi)}）</span>`:''}
      <button class="member-tag-del" onclick="delMember(${i})">×</button>
    </div>`).join('');
  const truckTags=trucks.map((t,i)=>`
    <div class="truck-reg-tag">🚛 ${esc(t)}<button class="truck-reg-tag-del" onclick="delTruck(${i})">×</button></div>`).join('');
  box.innerHTML=`<div class="member-box">
    <div class="member-head" onclick="toggleMemberBody()">
      <span>👥 メンバー・トラック登録</span>
      <button class="member-toggle-btn" onclick="event.stopPropagation();toggleMemberBody()">▼ 開閉</button>
    </div>
    <div class="member-body" id="memberBody">
      <div class="member-section-title">👤 メンバー（${members.length}人）</div>
      <div class="member-tags">${memberTags||'<span style="font-size:13px;color:#aaa">未登録</span>'}</div>
      <div class="member-add-row">
        <p class="member-add-hint">名前と読み仮名を入力して追加</p>
        <div class="member-add-inputs">
          <input class="member-add-input" type="text" id="memberNameInput" placeholder="名前">
          <input class="member-add-input" type="text" id="memberYomiInput" placeholder="読み">
          <button class="member-add-btn" onclick="addMember()">追加</button>
        </div>
      </div>
      <div class="member-section-title" style="margin-top:16px">🚛 トラック（${trucks.length}台）</div>
      <div class="truck-reg-tags">${truckTags||'<span style="font-size:13px;color:#aaa">未登録</span>'}</div>
      <div class="member-add-row">
        <div class="member-add-inputs">
          <input class="member-add-input" type="text" id="truckInput" placeholder="例：4tトラック">
          <button class="truck-add-btn" onclick="addTruck()">追加</button>
        </div>
      </div>
    </div>
  </div>`;
  document.getElementById('memberYomiInput').addEventListener('keydown',function(e){if(e.key==='Enter')addMember();});
  document.getElementById('memberNameInput').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('memberYomiInput').focus();});
  document.getElementById('truckInput').addEventListener('keydown',function(e){if(e.key==='Enter')addTruck();});
}

function toggleMemberBody(){const b=document.getElementById('memberBody');if(b)b.classList.toggle('open');}
function addMember(){
  const ni=document.getElementById('memberNameInput'),yi=document.getElementById('memberYomiInput');
  const name=ni.value.trim(),yomi=yi.value.trim();
  if(!name||members.some(m=>m.name===name)){ni.value='';yi.value='';return;}
  members.push({name,yomi});ni.value='';yi.value='';renderMembers();
}
function delMember(i){members.splice(i,1);renderMembers();}
function addTruck(){
  const inp=document.getElementById('truckInput');
  const name=inp.value.trim();
  if(!name||trucks.includes(name)){inp.value='';return;}
  trucks.push(name);inp.value='';renderMembers();
}
function delTruck(i){trucks.splice(i,1);renderMembers();}

/* メンバー複数選択ポップアップ */
function openMemberPopup(catId,ri,key){
  pickTarget={catId,ri,key};
  document.getElementById('memberSearchInput').value='';
  renderMemberList();
  document.getElementById('memberPopupOverlay').classList.add('show');
  setTimeout(()=>document.getElementById('memberSearchInput').focus(),100);
}
function getTimeNames(catId,ri,key){
  if(!allData[currentDate]||!allData[currentDate][catId]||!allData[currentDate][catId][ri])return[];
  const v=allData[currentDate][catId][ri][key];
  return Array.isArray(v)?v:v?[v]:[];
}
function renderMemberList(){
  const q=document.getElementById('memberSearchInput').value.trim().toLowerCase();
  const filtered=q?members.filter(m=>m.name.includes(q)||(m.yomi&&m.yomi.includes(q))):members;
  const selected=getTimeNames(pickTarget.catId,pickTarget.ri,pickTarget.key);
  const list=document.getElementById('memberListInPopup');
  let html='<div class="popup-list-item clear" onclick="clearTimeNames()">✕ クリア（全員外す）</div>';
  if(!filtered.length){html+='<div class="popup-list-empty">該当するメンバーがいません</div>';}
  else{
    html+=filtered.map(m=>{
      const checked=selected.includes(m.name);
      return`<div class="popup-list-item" onclick="toggleTimeName('${esc(m.name)}')" style="${checked?'background:#e8f4e8;font-weight:700':''}">
        <span>${checked?'✅ ':'⬜ '}${esc(m.name)}</span>
        ${m.yomi?`<span class="yomi">${esc(m.yomi)}</span>`:''}
      </div>`;
    }).join('');
  }
  list.innerHTML=html;
}
function toggleTimeName(name){
  const{catId,ri,key}=pickTarget;
  if(!allData[currentDate])allData[currentDate]=newDayData(currentDate);
  if(!allData[currentDate][catId])allData[currentDate][catId]=[newRow()];
  if(!allData[currentDate][catId][ri])allData[currentDate][catId][ri]=newRow();
  const row=allData[currentDate][catId][ri];
  if(!Array.isArray(row[key]))row[key]=row[key]?[row[key]]:[];
  const idx=row[key].indexOf(name);
  if(idx>=0)row[key].splice(idx,1);else row[key].push(name);
  renderMemberList();
  renderCats();
}
function clearTimeNames(){
  const{catId,ri,key}=pickTarget;
  if(allData[currentDate]&&allData[currentDate][catId]&&allData[currentDate][catId][ri])
    allData[currentDate][catId][ri][key]=[];
  renderMemberList();renderCats();
}
function addManualName(catId,ri,key,input){
  const name=input.value.trim();
  if(!name)return;
  if(!allData[currentDate])allData[currentDate]=newDayData(currentDate);
  if(!allData[currentDate][catId])allData[currentDate][catId]=[newRow()];
  if(!allData[currentDate][catId][ri])allData[currentDate][catId][ri]=newRow();
  const row=allData[currentDate][catId][ri];
  if(!Array.isArray(row[key]))row[key]=row[key]?[row[key]]:[];
  if(!row[key].includes(name))row[key].push(name);
  input.value='';
  renderCats();
}
function removeTimeName(catId,ri,key,name){
  if(!allData[currentDate]||!allData[currentDate][catId]||!allData[currentDate][catId][ri])return;
  const row=allData[currentDate][catId][ri];
  if(!Array.isArray(row[key]))return;
  const idx=row[key].indexOf(name);
  if(idx>=0)row[key].splice(idx,1);
  renderCats();
}

/* トラックポップアップ */
function openTruckPopup(catId,ri){
  truckTarget={catId,ri};renderTruckList();
  document.getElementById('truckPopupOverlay').classList.add('show');
}
function renderTruckList(){
  const row=getRow(truckTarget.catId,truckTarget.ri);
  const selected=row?row.trucks||[]:[];
  const list=document.getElementById('truckListInPopup');
  if(!trucks.length){list.innerHTML='<div class="popup-list-empty">トラックが登録されていません</div>';return;}
  let html=trucks.map(t=>{
    const checked=selected.includes(t);
    return`<div class="truck-popup-item" onclick="toggleTruck('${esc(t)}')" style="${checked?'background:#fff3e0;font-weight:700':''}">
      ${checked?'✅':'⬜'} 🚛 ${esc(t)}</div>`;
  }).join('');
  html+='<div class="truck-popup-item" style="color:#e8734a" onclick="clearTrucks()">✕ クリア（全て外す）</div>';
  list.innerHTML=html;
}
function toggleTruck(name){
  const{catId,ri}=truckTarget;
  if(!allData[currentDate])allData[currentDate]=newDayData(currentDate);
  const row=allData[currentDate][catId][ri];
  if(!row.trucks)row.trucks=[];
  const idx=row.trucks.indexOf(name);
  if(idx>=0)row.trucks.splice(idx,1);else row.trucks.push(name);
  renderTruckList();renderCats();
}
function clearTrucks(){
  const{catId,ri}=truckTarget;
  if(allData[currentDate]&&allData[currentDate][catId]&&allData[currentDate][catId][ri])
    allData[currentDate][catId][ri].trucks=[];
  renderTruckList();renderCats();
}

function closePopup(id){document.getElementById(id).classList.remove('show');}
function closePopupByOverlay(e,id){if(e.target===document.getElementById(id))closePopup(id);}
function getRow(catId,ri){
  if(!allData[currentDate]||!allData[currentDate][catId])return null;
  return allData[currentDate][catId][ri]||null;
}

function renderCats(){
  const cont=document.getElementById('cats');
  cont.innerHTML='';
  const dayData=allData[currentDate]||newDayData(currentDate);
  CATS.forEach(cat=>{
    const rows=dayData[cat.id]||[newRow()];
    const times=cat.times;
    let rowsHtml=rows.map((row,ri)=>{
      const selectedTrucks=row.trucks||[];
      const truckTagsHtml=selectedTrucks.map(t=>`<div class="truck-tag">🚛 ${esc(t)}<button class="truck-tag-del" onclick="removeTruckFromRow('${cat.id}',${ri},'${esc(t)}')">×</button></div>`).join('');
      const truckSection=cat.hasTruck?`<div class="truck-row">
        <span class="truck-label">🚛 トラック：</span>
        <div class="truck-tags">${truckTagsHtml}</div>
        <button class="truck-pick-btn" onclick="openTruckPopup('${cat.id}',${ri})">選択</button>
      </div>`:'';
      let timeItems=times.map(t=>{
        const names=Array.isArray(row[t.key])?row[t.key]:row[t.key]?[row[t.key]]:[];
        const nameTags=names.map(n=>`<div class="time-name-tag">${esc(n)}<button class="time-name-tag-del" onclick="removeTimeName('${cat.id}',${ri},'${t.key}','${esc(n)}')">×</button></div>`).join('');
        return`<div class="time-item">
          <span class="time-label">${t.label}</span>
          <div class="time-right">
            <div class="time-names">${nameTags}</div>
            <div class="time-manual-row">
              <input class="time-manual-input" type="text" placeholder="手入力で追加" autocomplete="off"
                onkeydown="if(event.key==='Enter'){addManualName('${cat.id}',${ri},'${t.key}',this);event.preventDefault()}">
              <button class="time-manual-add" onclick="addManualName('${cat.id}',${ri},'${t.key}',this.previousElementSibling)">追加</button>
              <button class="time-pick-btn" onclick="openMemberPopup('${cat.id}',${ri},'${t.key}')">一覧</button>
              <button class="time-pick-btn" style="background:#fff8e0;border-color:#e0c060;color:#806000" onclick="openCopyTimePopup('${cat.id}',${ri},'${t.key}')">📋</button>
            </div>
          </div>
        </div>`;
      }).join('');
      let delBtn=ri>0?`<button class="del-row-btn" onclick="delRow('${cat.id}',${ri})">×</button>`:'';
      return`<div class="row-block">
        <div class="row-top">
          <input class="site-input" type="text" value="${esc(row.site||'')}" placeholder="現場名を入力" oninput="setVal('${cat.id}',${ri},'site',this.value)">
          ${delBtn}
        </div>
        ${truckSection}
        <div class="time-list">${timeItems}</div>
      </div>`;
    }).join('');
    cont.innerHTML+=`<div class="cat">
      <div class="cat-head"><span>${cat.name}</span><button class="add-row-btn" onclick="addRow('${cat.id}')">＋ 現場追加</button></div>
      ${rowsHtml}
    </div>`;
  });
}

function removeTruckFromRow(catId,ri,name){
  const row=getRow(catId,ri);
  if(!row||!row.trucks)return;
  const idx=row.trucks.indexOf(name);
  if(idx>=0)row.trucks.splice(idx,1);
  renderCats();
}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function setVal(catId,ri,key,val){
  if(!allData[currentDate])allData[currentDate]=newDayData(currentDate);
  if(!allData[currentDate][catId])allData[currentDate][catId]=[newRow()];
  if(!allData[currentDate][catId][ri])allData[currentDate][catId][ri]=newRow();
  allData[currentDate][catId][ri][key]=val;
}
function addRow(catId){
  if(!allData[currentDate])allData[currentDate]=newDayData(currentDate);
  allData[currentDate][catId].push(newRow());renderCats();
}
function delRow(catId,ri){allData[currentDate][catId].splice(ri,1);renderCats();}

/* 時間帯コピー */
let copyTimeSrc={catId:null,ri:null,key:null};
let copyTimeDests=[];
function openCopyTimePopup(catId,ri,key){
  const names=getTimeNames(catId,ri,key);
  if(!names.length){showNotice('⚠️ コピー元に名前がありません');return;}
  copyTimeSrc={catId,ri,key};
  copyTimeDests=[];
  renderCopyTimeList();
  document.getElementById('copyTimePopupOverlay').classList.add('show');
}
function renderCopyTimeList(){
  const cat=CATS.find(c=>c.id===copyTimeSrc.catId);
  if(!cat)return;
  const list=document.getElementById('copyTimeListInPopup');
  const srcNames=getTimeNames(copyTimeSrc.catId,copyTimeSrc.ri,copyTimeSrc.key);
  let html=`<div style="padding:10px 20px;font-size:13px;color:#666;border-bottom:1px solid #eee">コピー元：<strong>${copyTimeSrc.key==='t1'?'8:00〜10:00':copyTimeSrc.key==='t2'?'10:30〜12:00':copyTimeSrc.key==='t3'?'13:00〜15:00':copyTimeSrc.key==='t4'?'15:30〜17:00':'17:00〜20:00(残業)'}</strong>（${srcNames.join('・')}）</div>`;
  html+=cat.times.filter(t=>t.key!==copyTimeSrc.key).map(t=>{
    const checked=copyTimeDests.includes(t.key);
    return`<div class="popup-list-item" onclick="toggleCopyDest('${t.key}')" style="${checked?'background:#fff8e0;font-weight:700':''}">
      ${checked?'✅':'⬜'} ${t.label}
    </div>`;
  }).join('');
  list.innerHTML=html;
}
function toggleCopyDest(key){
  const idx=copyTimeDests.indexOf(key);
  if(idx>=0)copyTimeDests.splice(idx,1);else copyTimeDests.push(key);
  renderCopyTimeList();
}
function execCopyTime(){
  if(!copyTimeDests.length){showNotice('⚠️ コピー先を選んでください');return;}
  const{catId,ri,key}=copyTimeSrc;
  const srcNames=JSON.parse(JSON.stringify(getTimeNames(catId,ri,key)));
  if(!allData[currentDate])allData[currentDate]=newDayData(currentDate);
  copyTimeDests.forEach(destKey=>{
    const row=allData[currentDate][catId][ri];
    if(!row)return;
    // 既存の名前に追加（重複除く）
    if(!Array.isArray(row[destKey]))row[destKey]=row[destKey]?[row[destKey]]:[];
    srcNames.forEach(n=>{if(!row[destKey].includes(n))row[destKey].push(n);});
  });
  closePopup('copyTimePopupOverlay');
  renderCats();
  showNotice('✓ '+copyTimeDests.length+'つの時間帯にコピーしました');
}
function copyPrevDay(){
  // 前日の日付を計算
  const cur=new Date(currentDate);
  cur.setDate(cur.getDate()-1);
  const prev=cur.getFullYear()+'-'+String(cur.getMonth()+1).padStart(2,'0')+'-'+String(cur.getDate()).padStart(2,'0');
  if(!allData[prev]){
    showNotice('⚠️ 前日（'+prev+'）の保存データがありません');
    return;
  }
  if(!confirm(prev+'のデータを'+currentDate+'にコピーしますか？\n現在の入力内容は上書きされます。')){return;}
  // ディープコピー
  const copied=JSON.parse(JSON.stringify(allData[prev]));
  copied.date=currentDate;
  allData[currentDate]=copied;
  renderCats();
  showNotice('✓ '+prev+'のデータをコピーしました');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');showNotice('✓ ブックマークに保存してください');}
function copyUrl(){
  const url=document.getElementById('modalUrl').textContent;
  if(navigator.clipboard){navigator.clipboard.writeText(url).then(()=>{showNotice('✓ URLをコピーしました！');closeModal();});}
  else{const ta=document.createElement('textarea');ta.value=url;document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);showNotice('✓ URLをコピーしました！');closeModal();}
}
function showNotice(msg){
  const n=document.getElementById('notice');n.textContent=msg;n.style.display='block';
  setTimeout(()=>{n.style.display='none';},2500);
}
function printPDF(){document.getElementById('printDate').textContent=currentDate;window.print();}

function exportHTML(){
  const d=currentDate;const dayData=allData[d]||{};const now=new Date().toLocaleString('ja-JP');
  let secHtml='';
  CATS.forEach(cat=>{
    const rows=(dayData[cat.id]||[]).filter(r=>r.site||cat.times.some(t=>{const v=r[t.key];return Array.isArray(v)?v.length:v;})||(r.trucks&&r.trucks.length));
    if(!rows.length)return;
    let ths=cat.times.map(t=>`<th style="background:#f0ede6;padding:8px 5px;border:1px solid #ccc;font-size:11px;white-space:nowrap;font-weight:500">${t.label}</th>`).join('');
    let trs=rows.map(row=>{
      const truckStr=(row.trucks&&row.trucks.length)?row.trucks.map(t=>`🚛${t}`).join(' '):'';
      let tds=cat.times.map(t=>{
        const v=row[t.key];
        const names=Array.isArray(v)?v:v?[v]:[];
        if(!names.length)return`<td style="padding:8px 5px;border:1px solid #ddd;text-align:center"></td>`;
        return`<td style="padding:8px 5px;border:1px solid #ddd;text-align:center;background:#e6f4e6;font-size:12px">${names.map(n=>`<div style="font-weight:600">${n}</div>`).join('')}</td>`;
      }).join('');
      return`<tr><td style="padding:8px 10px;border:1px solid #ddd;font-size:13px;background:#fafaf8">
        <div style="font-weight:700">${row.site||''}</div>
        ${truckStr?`<div style="font-size:11px;color:#c07030;margin-top:3px">${truckStr}</div>`:''}
      </td>${tds}</tr>`;
    }).join('');
    secHtml+=`<div style="margin-bottom:1.5rem"><div style="background:#333;color:#fff;padding:8px 14px;font-size:14px;font-weight:700;border-radius:5px 5px 0 0">${cat.name}</div><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;background:#fff;min-width:500px"><thead><tr><th style="background:#f0ede6;padding:8px 10px;border:1px solid #ccc;text-align:left;min-width:110px;font-size:12px">現場名</th>${ths}</tr></thead><tbody>${trs}</tbody></table></div></div>`;
  });
  if(!secHtml){alert('データが入力されていません。');return;}
  const html=`<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>作業日報 ${d}</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Hiragino Kaku Gothic ProN','Meiryo',sans-serif;background:#f4f2ed;color:#222}.container{max-width:980px;margin:0 auto;padding:1.5rem 1rem 3rem}header{display:flex;align-items:baseline;gap:16px;margin-bottom:1.5rem;border-bottom:2px solid #333;padding-bottom:10px}h1{font-size:20px;font-weight:700}.date-lbl{font-size:17px;color:#555}.footer{margin-top:2rem;font-size:11px;color:#aaa;text-align:right}</style></head><body><div class="container"><header><h1>作業日報</h1><span class="date-lbl">${d}</span></header>${secHtml}<div class="footer">作成：${now}</div></div></body></html>`;
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=`nippo_${d}.html`;document.body.appendChild(a);a.click();document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  showNotice('✓ 作成しました！');
}

loadFromHash();
const td=today();
currentDate=td;
if(!allData[td])allData[td]=newDayData(td);
document.getElementById('reportDate').value=td;
renderMembers();renderCats();renderHistory();
document.getElementById('reportDate').addEventListener('change',function(){if(this.value)loadDay(this.value);});
</script>
</body>
